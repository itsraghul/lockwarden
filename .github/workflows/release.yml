name: release

on:
  push:
    branches: [main]
  # Dispatched by osv-refresh.yml / incident-bundle.yml after their auto-merge
  # PR lands: npm trusted publishing is bound to THIS workflow file (verified
  # 2026-07-07 — every release's _npmUser is the GitHub Actions OIDC publisher,
  # and npm allows one trusted publisher per package), so all publishes route
  # through here. Auto-merges via GITHUB_TOKEN never fire `on: push`, hence the
  # explicit dispatch (workflow_dispatch is exempt from the recursion block).
  workflow_dispatch:

concurrency: release-${{ github.ref }}

jobs:
  release:
    # Account guard: never publish from a fork or any other repo.
    if: github.repository == 'itsraghul/lockwarden'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # pnpm 11 needs Node >= 22.13
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - name: create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm exec changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      # The Action pins the CLI version it runs (never floats on latest). Keep
      # that pin in sync automatically: when a publish happened, land the bump
      # on protected main via an auto-merged PR (the incident-bundle.yml
      # pattern). action-tag.yml then moves the floating v1 tag once the pin
      # change reaches main — the release-completion steps that used to be
      # manual (and drifted twice: 0.2.0->0.3.1, 0.3.1->0.5.0).
      - name: sync the Action's pinned CLI version
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          VERSION=$(echo "$PUBLISHED" | jq -r '.[] | select(.name == "lockwarden") | .version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "no lockwarden publish in this run — nothing to sync"; exit 0
          fi
          CURRENT=$(grep -Eo '^ +default: [0-9]+\.[0-9]+\.[0-9]+ *$' packages/action/action.yml | awk '{print $2}')
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "action pin already $VERSION"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="action-pin/$VERSION"
          git checkout -b "$BRANCH"
          sed -i "s/^\( *\)default: $CURRENT *$/\1default: $VERSION/" packages/action/action.yml
          git add packages/action/action.yml
          git commit -m "chore(action): bump pinned CLI $CURRENT -> $VERSION"
          git push origin "HEAD:$BRANCH"
          gh pr create \
            --head "$BRANCH" \
            --title "chore(action): bump pinned CLI $CURRENT → $VERSION" \
            --body "Auto-generated by release.yml after publishing lockwarden@$VERSION. When this merges, action-tag.yml moves the floating v1 tag."
          gh pr merge "$BRANCH" --auto --squash
