name: osv-refresh

# Weekly advisory-data pipeline: refresh the vendored OSV npm MAL snapshot
# from osv.dev → validate + self-test → land the version commit on protected
# main via an auto-merged PR → dispatch release.yml to publish the patch.
# npm trusted publishing is bound to release.yml (one trusted publisher per
# package), so this workflow cannot publish directly — verified 2026-07-07
# when direct `changeset publish` here got npm's E404 auth disguise while
# release.yml kept publishing fine via OIDC. A no-change week skips everything
# — a stale generatedAt on the latest release is the signal this pipeline
# died, which --max-advisory-age exists to surface; routine re-stamping would
# launder a dead pipe as fresh.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 're-stamp and publish even when upstream entries are unchanged'
        type: boolean
        default: false

concurrency: osv-refresh

jobs:
  refresh:
    if: github.repository == 'itsraghul/lockwarden'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write # dispatch release.yml (the npm trusted publisher)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: refresh snapshot from osv.dev
        id: refresh
        run: |
          node --experimental-strip-types scripts/refresh-osv-snapshot.ts \
            ${{ inputs.force == true && '--force' || '' }}

      - name: build
        if: steps.refresh.outputs.changed == 'true'
        run: pnpm build

      - name: validate + self-test (hit fixture exits 1, clean exits 0)
        if: steps.refresh.outputs.changed == 'true'
        run: node --experimental-strip-types scripts/validate-osv-snapshot.ts

      - name: quick regression gate
        if: steps.refresh.outputs.changed == 'true'
        # lint included: the refreshed snapshot must pass the same checks the
        # PR's required CI runs (a >1MiB snapshot once tripped biome's maxSize
        # and deadlocked the auto-merge — catch that here, before the PR).
        run: pnpm test:unit && pnpm lint

      - name: version the patch release
        if: steps.refresh.outputs.changed == 'true'
        run: |
          DATE=$(date -u +%F)
          cat > ".changeset/osv-refresh-$DATE.md" <<EOF
          ---
          'lockwarden': patch
          ---

          OSV snapshot refresh $DATE: ${{ steps.refresh.outputs.count }} entries (+${{ steps.refresh.outputs.added }} new / −${{ steps.refresh.outputs.removed }} removed, ${{ steps.refresh.outputs.window }}mo window)
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "osv-refresh/$DATE"
          pnpm exec changeset version
          pnpm build
          git add -A
          git commit -m "osv snapshot refresh: $DATE"
          git push origin "HEAD:osv-refresh/$DATE"

      - name: land the version commit via auto-merge PR (main is protected)
        if: steps.refresh.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u +%F)
          gh pr create \
            --head "osv-refresh/$DATE" \
            --title "osv snapshot refresh: $DATE" \
            --body "Auto-generated by osv-refresh.yml. This PR lands the version bump + refreshed snapshot (${{ steps.refresh.outputs.count }} entries, +${{ steps.refresh.outputs.added }}/−${{ steps.refresh.outputs.removed }}, ${{ steps.refresh.outputs.window }}mo window). Validate + self-test passed. Once it auto-merges, release.yml is dispatched to publish the npm patch (trusted publishing is bound to release.yml)."
          gh pr merge "osv-refresh/$DATE" --auto --squash

      - name: wait for the merge, then dispatch release.yml to publish
        if: steps.refresh.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u +%F)
          STATE=""
          for i in $(seq 1 60); do
            STATE=$(gh pr view "osv-refresh/$DATE" --json state --jq .state)
            [ "$STATE" = "MERGED" ] && break
            if [ "$STATE" = "CLOSED" ]; then
              echo "PR closed without merging — no publish"; exit 1
            fi
            sleep 20
          done
          if [ "$STATE" != "MERGED" ]; then
            echo "PR not merged after 20 minutes (required checks stuck?)."
            echo "Once it lands, publish manually: gh workflow run release.yml --ref main"
            exit 1
          fi
          gh workflow run release.yml --ref main
          echo "release.yml dispatched — it publishes the versioned patch from main"
