name: osv-refresh

# Weekly advisory-data pipeline: refresh the vendored OSV npm MAL snapshot
# from osv.dev → validate + self-test → publish an npm patch FIRST → land the
# version commit on protected main via an auto-merged PR (the incident-bundle
# pattern). A no-change week skips everything — a stale generatedAt on the
# latest release is the signal this pipeline died, which --max-advisory-age
# exists to surface; routine re-stamping would launder a dead pipe as fresh.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 're-stamp and publish even when upstream entries are unchanged'
        type: boolean
        default: false

concurrency: osv-refresh

jobs:
  refresh:
    if: github.repository == 'itsraghul/lockwarden'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      - name: refresh snapshot from osv.dev
        id: refresh
        run: |
          node --experimental-strip-types scripts/refresh-osv-snapshot.ts \
            ${{ inputs.force == true && '--force' || '' }}

      - name: build
        if: steps.refresh.outputs.changed == 'true'
        run: pnpm build

      - name: validate + self-test (hit fixture exits 1, clean exits 0)
        if: steps.refresh.outputs.changed == 'true'
        run: node --experimental-strip-types scripts/validate-osv-snapshot.ts

      - name: quick regression gate
        if: steps.refresh.outputs.changed == 'true'
        run: pnpm test:unit

      - name: version + publish to npm (before the PR — data freshness first)
        if: steps.refresh.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          DATE=$(date -u +%F)
          cat > ".changeset/osv-refresh-$DATE.md" <<EOF
          ---
          'lockwarden': patch
          ---

          OSV snapshot refresh $DATE: ${{ steps.refresh.outputs.count }} entries (+${{ steps.refresh.outputs.added }} new / −${{ steps.refresh.outputs.removed }} removed, ${{ steps.refresh.outputs.window }}mo window)
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "osv-refresh/$DATE"
          pnpm exec changeset version
          pnpm build
          git add -A
          git commit -m "osv snapshot refresh: $DATE"
          pnpm exec changeset publish
          git push --follow-tags origin "HEAD:osv-refresh/$DATE"

      - name: land the version commit via auto-merge PR (main is protected)
        if: steps.refresh.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u +%F)
          gh pr create \
            --head "osv-refresh/$DATE" \
            --title "osv snapshot refresh: $DATE" \
            --body "Auto-generated by osv-refresh.yml. npm patch is ALREADY PUBLISHED; this PR lands the version bump + refreshed snapshot (${{ steps.refresh.outputs.count }} entries, +${{ steps.refresh.outputs.added }}/−${{ steps.refresh.outputs.removed }}, ${{ steps.refresh.outputs.window }}mo window). Validate + self-test passed."
          gh pr merge "osv-refresh/$DATE" --auto --squash
