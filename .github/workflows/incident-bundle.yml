name: incident-bundle

# Incident-day pipeline: paste an IOC bundle JSON → validated → self-tested →
# version-bumped → published to npm → pushed. Target: <15 minutes from
# "new IOC in hand" to `npx lockwarden check --incident <id>` working worldwide.
#
# npm publish happens FIRST (the one-liner works worldwide immediately); the
# version-bump commit then lands on the protected main via an auto-merged PR
# once CI is green. The self-test gate replaces human review — speed is the
# promise, and main stays protected.

on:
  workflow_dispatch:
    inputs:
      bundle:
        description: 'The incident IOC bundle JSON (see src/data/incidents/_schema.json)'
        required: true
        type: string

concurrency: incident-bundle

jobs:
  ship:
    if: github.repository == 'itsraghul/lockwarden'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      - name: write bundle file
        id: bundle
        env:
          BUNDLE_JSON: ${{ inputs.bundle }}
        run: |
          ID=$(node -e 'const b=JSON.parse(process.env.BUNDLE_JSON);if(!/^[a-z0-9][a-z0-9-]*$/.test(b.id))process.exit(1);console.log(b.id)')
          echo "$BUNDLE_JSON" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>process.stdout.write(JSON.stringify(JSON.parse(s),null,2)+"\n"))' \
            > "packages/cli/src/data/incidents/${ID}.json"
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: regenerate incident index + build
        run: |
          node --experimental-strip-types scripts/generate-incident-index.ts
          pnpm build

      - name: validate + self-test (hit fixture exits 1, clean exits 0)
        run: node --experimental-strip-types scripts/validate-incident-bundle.ts "packages/cli/src/data/incidents/${{ steps.bundle.outputs.id }}.json"

      - name: quick regression gate
        run: pnpm test:unit

      - name: version + publish to npm (before the PR — incident speed first)
        run: |
          cat > ".changeset/incident-${{ steps.bundle.outputs.id }}.md" <<EOF
          ---
          'lockwarden': patch
          ---

          Incident bundle: ${{ steps.bundle.outputs.id }} — \`npx lockwarden check --incident ${{ steps.bundle.outputs.id }}\`
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "incident/${{ steps.bundle.outputs.id }}"
          pnpm exec changeset version
          pnpm build
          git add -A
          git commit -m "incident bundle: ${{ steps.bundle.outputs.id }}"
          pnpm exec changeset publish
          git push --follow-tags origin "HEAD:incident/${{ steps.bundle.outputs.id }}"

      - name: land the version commit via auto-merge PR (main is protected)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --head "incident/${{ steps.bundle.outputs.id }}" \
            --title "incident bundle: ${{ steps.bundle.outputs.id }}" \
            --body "Auto-generated by incident-bundle.yml. npm patch is ALREADY PUBLISHED; this PR lands the version bump + bundle data. Self-test passed (hit fixture exit 1, clean exit 0)."
          gh pr merge "incident/${{ steps.bundle.outputs.id }}" --auto --squash
