name: incident-bundle

# Incident-day pipeline: paste an IOC bundle JSON → validated → self-tested →
# version-bumped → landed on protected main via auto-merged PR → release.yml
# dispatched to publish. Target: <25 minutes from "new IOC in hand" to
# `npx lockwarden check --incident <id>` working worldwide (the auto-merge's
# required checks, ~10 min, are on the critical path).
#
# npm trusted publishing is bound to release.yml (one trusted publisher per
# package, verified 2026-07-07), so this workflow cannot publish directly —
# a `changeset publish` here gets npm's E404 auth disguise. The self-test
# gate replaces human review — speed is the promise, and main stays protected.

on:
  workflow_dispatch:
    inputs:
      bundle:
        description: 'The incident IOC bundle JSON (see src/data/incidents/_schema.json)'
        required: true
        type: string

concurrency: incident-bundle

jobs:
  ship:
    if: github.repository == 'itsraghul/lockwarden'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write # dispatch release.yml (the npm trusted publisher)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: write bundle file
        id: bundle
        env:
          BUNDLE_JSON: ${{ inputs.bundle }}
        run: |
          ID=$(node -e 'const b=JSON.parse(process.env.BUNDLE_JSON);if(!/^[a-z0-9][a-z0-9-]*$/.test(b.id))process.exit(1);console.log(b.id)')
          echo "$BUNDLE_JSON" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>process.stdout.write(JSON.stringify(JSON.parse(s),null,2)+"\n"))' \
            > "packages/cli/src/data/incidents/${ID}.json"
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: regenerate incident index + build
        run: |
          node --experimental-strip-types scripts/generate-incident-index.ts
          pnpm build

      - name: validate + self-test (hit fixture exits 1, clean exits 0)
        run: node --experimental-strip-types scripts/validate-incident-bundle.ts "packages/cli/src/data/incidents/${{ steps.bundle.outputs.id }}.json"

      - name: quick regression gate
        run: pnpm test:unit

      - name: version the patch release
        run: |
          cat > ".changeset/incident-${{ steps.bundle.outputs.id }}.md" <<EOF
          ---
          'lockwarden': patch
          ---

          Incident bundle: ${{ steps.bundle.outputs.id }} — \`npx lockwarden check --incident ${{ steps.bundle.outputs.id }}\`
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "incident/${{ steps.bundle.outputs.id }}"
          pnpm exec changeset version
          pnpm build
          git add -A
          git commit -m "incident bundle: ${{ steps.bundle.outputs.id }}"
          git push origin "HEAD:incident/${{ steps.bundle.outputs.id }}"

      - name: land the version commit via auto-merge PR (main is protected)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --head "incident/${{ steps.bundle.outputs.id }}" \
            --title "incident bundle: ${{ steps.bundle.outputs.id }}" \
            --body "Auto-generated by incident-bundle.yml. This PR lands the version bump + bundle data. Self-test passed (hit fixture exit 1, clean exit 0). Once it auto-merges, release.yml is dispatched to publish the npm patch (trusted publishing is bound to release.yml)."
          gh pr merge "incident/${{ steps.bundle.outputs.id }}" --auto --squash

      - name: wait for the merge, then dispatch release.yml to publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATE=""
          for i in $(seq 1 60); do
            STATE=$(gh pr view "incident/${{ steps.bundle.outputs.id }}" --json state --jq .state)
            [ "$STATE" = "MERGED" ] && break
            if [ "$STATE" = "CLOSED" ]; then
              echo "PR closed without merging — no publish"; exit 1
            fi
            sleep 20
          done
          if [ "$STATE" != "MERGED" ]; then
            echo "PR not merged after 20 minutes (required checks stuck?)."
            echo "Once it lands, publish manually: gh workflow run release.yml --ref main"
            exit 1
          fi
          gh workflow run release.yml --ref main
          echo "release.yml dispatched — it publishes the versioned patch from main"
